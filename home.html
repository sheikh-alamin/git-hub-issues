            </div>
            <div class="flex gap-2">

            <button onclick="loadOpen()" class="py-2 px-9 rounded-md border-gray-200 border text-[#64748B] cursor-pointer">Open</button>
            <button onclick="loadClosed()" class="py-2 px-9 rounded-md border-gray-200 border text-[#64748B] cursor-pointer">Closed</button>
        </div>
    </section>
    <section>

                    <h2 id="issuesCount" class="font-semibold text-5">0 <span>Issues</span></h2>
                    <p class="font-medium text-[#64748B]">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-circle text-green-700"></i>
                <h2>Open</h2>
                <i class="fa-solid fa-circle text-purple-700"></i>
                <h2>Closed</h2>
            </div>
        </div>
    </section>
